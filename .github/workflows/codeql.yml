name: CodeQL Analysis
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.runner }}
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
            runner: ubuntu-latest
          - language: actions
            build-mode: none
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Setup MSBuild
        if: matrix.language == 'csharp' && matrix.build-mode == 'manual'
        uses: microsoft/setup-msbuild@v2
      - name: Manual build (C#)
        if: matrix.language == 'csharp' && matrix.build-mode == 'manual'
        run: msbuild /t:rebuild
      - name: Manual build (Java/Kotlin)
        if: matrix.language == 'java-kotlin' && matrix.build-mode == 'manual'
        run: |
          if [ -f gradlew ]; then
            ./gradlew build --no-daemon
          elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            gradle build --no-daemon
          elif [ -f pom.xml ]; then
            mvn -B package -DskipTests
          else
            echo "No Gradle/Maven build file found — manual build configuration required" && exit 1
          fi
      - name: Manual build (C/C++)
        if: matrix.language == 'c-cpp' && matrix.build-mode == 'manual'
        run: |
          if [ -f CMakeLists.txt ]; then
            cmake -B build && cmake --build build
          elif [ -f Makefile ]; then
            make
          else
            echo "No CMakeLists.txt or Makefile found — manual build configuration required" && exit 1
          fi
      - name: Manual build (Swift)
        if: matrix.language == 'swift' && matrix.build-mode == 'manual'
        run: |
          scheme=$(xcodebuild -list -json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('project') or d.get('workspace',{})).get('schemes',[''])[0])" 2>/dev/null)
          xcodebuild build -scheme "${scheme}" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
