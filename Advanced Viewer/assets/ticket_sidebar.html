<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>html, body { margin: 0; padding: 0; height: 1px; overflow: hidden; }</style>
</head>
<body>
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
  <script>
    var client = ZAFClient.init();
    // Shrink to invisible — this sidebar exists only to relay ticket events
    client.invoke('resize', { height: '1px' });
    // When the agent submits a ticket, signal the nav_bar iframe to auto-advance Play mode
    client.on('ticket.submit.always', function () {
      try { localStorage.setItem('zd-play-advance', Date.now().toString()); } catch (e) {}
    });
  </script>
</body>
</html>
